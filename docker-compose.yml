services:
  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/graph/project/list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
